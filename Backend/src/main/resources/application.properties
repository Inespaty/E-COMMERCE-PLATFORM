spring.application.name=Backend

# Server port — must match the proxy target in Frontend/vite.config.js
server.port=8080

# Supabase PostgreSQL Connection (recommended via environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driverClassName=org.postgresql.Driver



# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Enable H2 Console (Access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Master Admin Credentials (For DataSeeder)
# In local development, it reads from here. In production (Render), these are overridden by secure Environment Variables.
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.name=${ADMIN_NAME}
app.admin.phone=${ADMIN_PHONE}

# File Upload Configuration
app.upload.dir=uploads/products
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Email Configuration (Mailtrap for Dev)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.trust=${MAIL_SMTP_TRUST:}
spring.mail.properties.mail.smtp.from=${MAIL_FROM:noreply@ecom.rw}

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
app.google.web-client-id=${GOOGLE_WEB_CLIENT_ID:}
app.frontend.url=${FRONTEND_URL:}

# Flutterwave Configuration 
app.flutterwave.secret-key=${FLUTTERWAVE_SECRET_KEY}
app.flutterwave.webhook-secret=${FLUTTERWAVE_WEBHOOK_SECRET}
