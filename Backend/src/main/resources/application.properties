spring.application.name=Backend

# Server port — must match the proxy target in Frontend/vite.config.js
server.port=8080

# Database Configuration (Credentials in .env)
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HikariCP connection pool — keeps connections warm to reduce cold-start latency
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000


# Admin Initialization (Credentials in .env)
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}
app.admin.name=${ADMIN_NAME:}
app.admin.phone=${ADMIN_PHONE:+250780000000}

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# Mail Configuration (Credentials in .env)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.from=${MAIL_FROM:}

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://127.0.0.1:8080/login/oauth2/code/google
app.google.web-client-id=${GOOGLE_WEB_CLIENT_ID:}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Flutterwave Configuration (Keys in .env)
app.flutterwave.secret-key=${FLUTTERWAVE_SECRET_KEY:}
app.flutterwave.webhook-secret=${FLUTTERWAVE_WEBHOOK_SECRET:}
